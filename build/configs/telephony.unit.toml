# /etc/zethra/units/telephony.unit.toml
# ZethraOS Telephony Service unit file

name        = "zethra-telephony"
description = "ZethraOS telephony stack (calls, SMS, data)"
after       = ["zethrad-base", "zethra-modem-hal"]
exec_start  = "/usr/lib/zethra/telephony/zethra-telephonyd --config /etc/zethra/telephony.toml"
restart     = "on_failure"
restart_delay_ms = 2000
watchdog_sec = 30
