# /etc/aether/units/telephony.unit.toml
# AetherOS Telephony Service unit file

name        = "aether-telephony"
description = "AetherOS telephony stack (calls, SMS, data)"
after       = ["aetherd-base", "aether-modem-hal"]
exec_start  = "/usr/lib/aether/telephony/aether-telephonyd --config /etc/aether/telephony.toml"
restart     = "on_failure"
restart_delay_ms = 2000
watchdog_sec = 30
